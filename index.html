<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>The Leadership Lunch Club · Birdie</title>
<link rel="icon" href="assets/favicon.png"/>
<meta name="ext-resource-dependency" content="assets/logo-birdie-navy.png" data-resource-id="logoNavy" />
<meta name="ext-resource-dependency" content="assets/lunch-club-logo.png" data-resource-id="lunchClubLogo" />
<meta name="ext-resource-dependency" content="assets/cal-tilt-right.png" data-resource-id="calTiltRight" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css"/>
<script charset="utf-8" type="text/javascript" src="//js.hsforms.net/forms/embed/v2.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--fg-default);
    background: var(--birdie-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; }
  img { display: block; max-width: 100%; }

  /* ------------ Buttons ------------ */
  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    padding: 14px 26px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background var(--duration-base) var(--ease-out), box-shadow var(--duration-base) var(--ease-out), transform var(--duration-base) var(--ease-out);
  }
  .btn-navy { background: var(--birdie-navy); color: #fff; }
  .btn-navy:hover { background: #053163; box-shadow: var(--shadow-md); }
  .btn-orange { background: var(--birdie-orange); color: var(--birdie-navy); }
  .btn-orange:hover { background: #d78300; box-shadow: var(--shadow-md); }
  .btn-hollow { background: transparent; color: var(--birdie-navy); box-shadow: inset 0 0 0 1.5px var(--birdie-navy); }
  .btn-hollow-white { background: transparent; color: #fff; box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.6); }
  .btn-hollow-white:hover { box-shadow: inset 0 0 0 1.5px #fff; }
  .btn-lg { padding: 18px 34px; font-size: 17px; }

  /* ------------ Top nav ------------ */
  .nav {
    position: sticky; top: 0; z-index: 20;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-soft);
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 14px 28px;
    display: flex; align-items: center; gap: 32px;
  }
  .nav img.logo { height: 26px; }
  .nav-tag {
    font-family: var(--font-body);
    font-size: 13px; color: var(--fg-soft);
    border-left: 1px solid var(--border-default);
    padding-left: 16px;
  }
  .nav-cta { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  /* ------------ Hero ------------ */
  .hero {
    position: relative;
    background: var(--birdie-navy);
    color: #fff;
    overflow: hidden;
    padding: 80px 28px 96px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -140px; right: -160px;
    width: 460px; height: 460px;
    border-radius: 55% 45% 50% 50% / 42% 58% 42% 58%;
    background: radial-gradient(circle at 40% 40%, rgba(84,189,184,0.35), rgba(84,189,184,0) 70%);
    filter: blur(6px);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -200px; left: -160px;
    width: 420px; height: 420px;
    border-radius: 60% 40% 48% 52% / 52% 60% 40% 48%;
    background: radial-gradient(circle at 60% 40%, rgba(240,150,0,0.22), rgba(240,150,0,0) 70%);
  }
  .hero-inner {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 72px;
    align-items: center;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-body); font-weight: 600;
    font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--birdie-teal);
    margin-bottom: 24px;
  }

  .hero h1 {
    font-family: var(--font-hero);
    font-weight: 700;
    font-size: clamp(40px, 5.4vw, 68px);
    line-height: 1.02;
    letter-spacing: -0.02em;
    color: #fff;
    margin: 0 0 22px;
    text-wrap: balance;
  }
  .hero h1 .accent { color: var(--birdie-orange); }
  .hero .lede {
    font-family: var(--font-body);
    font-size: 19px;
    line-height: 1.55;
    color: rgba(255,255,255,0.82);
    max-width: 560px;
    margin: 0 0 34px;
    text-wrap: pretty;
  }
  .hero-meta {
    display: flex; flex-wrap: wrap;
    gap: 26px 38px;
    margin: 0 0 36px;
  }
  .hero-meta .item { display: flex; align-items: center; gap: 10px; font-size: 14px; color: rgba(255,255,255,0.9); }
  .hero-meta .item svg { width: 18px; height: 18px; color: var(--birdie-teal); stroke-width: 1.75; }
  .hero-ctas { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .hero-sub { margin-top: 16px; font-size: 13.5px; color: rgba(255,255,255,0.65); font-style: italic; }

  /* Logo block on the right */
  .hero-logo-wrap {
    position: relative;
    display: flex; justify-content: center; align-items: center;
    padding: 20px;
  }
  .hero-logo-wrap::before {
    content: '';
    position: absolute;
    width: 120%; height: 120%;
    left: -10%; top: -10%;
    border-radius: 50% 42% 48% 52% / 52% 58% 42% 48%;
    background: radial-gradient(circle at 50% 50%, rgba(84,189,184,0.18), rgba(84,189,184,0) 60%);
    z-index: 0;
  }
  .hero-logo {
    position: relative; z-index: 1;
    max-width: 460px; width: 100%;
    filter: drop-shadow(0 24px 50px rgba(0,0,0,0.45));
    transform: rotate(-2deg);
    transition: transform var(--duration-slow) var(--ease-spring);
  }
  .hero-logo:hover { transform: rotate(0deg) scale(1.02); }

  /* Date chip cluster floating near the logo */
  .date-chip {
    position: absolute;
    background: #fff;
    color: var(--birdie-navy);
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    font-family: var(--font-hero);
    font-weight: 600;
    display: flex; align-items: center; gap: 10px;
    z-index: 2;
  }
  .date-chip.top { top: 6%; left: -6%; transform: rotate(-6deg); }
  .date-chip.bot { bottom: 4%; right: -4%; transform: rotate(4deg); }
  .date-chip .icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--birdie-mint-25);
    display: grid; place-items: center;
  }
  .date-chip .icon svg { width: 18px; height: 18px; color: var(--birdie-navy); stroke-width: 2; }
  .date-chip .l1 { font-size: 11px; font-weight: 500; color: var(--fg-soft); letter-spacing: 0.04em; text-transform: uppercase; }
  .date-chip .l2 { font-size: 14px; font-weight: 700; }

  /* ------------ Intro band ------------ */
  .intro {
    background: var(--birdie-off-white);
    padding: 88px 28px;
  }
  .intro-inner {
    max-width: 1000px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1.6fr; gap: 72px;
    align-items: start;
  }
  .intro-eyebrow {
    font-family: var(--font-body); font-weight: 600;
    font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--birdie-teal);
    margin-bottom: 10px;
  }
  .intro h2 {
    font-family: var(--font-hero); font-weight: 700;
    font-size: 34px; line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--birdie-navy); margin: 0;
    text-wrap: balance;
  }
  .intro p {
    font-size: 17px; line-height: 1.6;
    color: var(--fg-soft);
    margin: 0 0 18px;
  }
  .intro p:last-child { margin-bottom: 0; }
  .intro p strong { color: var(--birdie-navy); font-weight: 600; }

  /* ------------ Sessions ------------ */
  .sessions {
    padding: 104px 28px;
    background: #fff;
    position: relative;
    overflow: hidden;
  }
  .sessions-inner { max-width: 1200px; margin: 0 auto; position: relative; }
  .section-head {
    text-align: center;
    max-width: 680px;
    margin: 0 auto 64px;
  }
  .section-head .eyebrow {
    font-family: var(--font-body); font-weight: 600;
    font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--birdie-teal);
    margin-bottom: 14px;
  }
  .section-head h2 {
    font-family: var(--font-hero); font-weight: 700;
    font-size: 44px; line-height: 1.05;
    letter-spacing: -0.015em;
    color: var(--birdie-navy);
    margin: 0 0 16px;
    text-wrap: balance;
  }
  .section-head p {
    font-size: 17px; color: var(--fg-soft);
    line-height: 1.55;
    margin: 0;
  }

  .session-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    position: relative;
  }
  .session {
    position: relative;
    background: #fff;
    border: 1.2px solid var(--border-soft);
    border-radius: 22px;
    padding: 32px 32px 32px 110px;
    transition: box-shadow var(--duration-base) var(--ease-out), border-color var(--duration-base) var(--ease-out), transform var(--duration-base) var(--ease-out);
  }
  .session:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--birdie-navy-25);
    transform: translateY(-2px);
  }
  .session .num {
    position: absolute;
    left: 32px; top: 32px;
    width: 58px; height: 58px;
    border-radius: 16px;
    background: var(--birdie-mint-25);
    color: var(--birdie-navy);
    font-family: var(--font-hero);
    font-weight: 700;
    font-size: 24px;
    display: grid; place-items: center;
    letter-spacing: -0.01em;
  }
  .session:nth-child(2) .num { background: color-mix(in srgb, var(--birdie-teal) 18%, #fff); }
  .session:nth-child(3) .num { background: color-mix(in srgb, var(--birdie-orange) 18%, #fff); color: var(--birdie-navy); }
  .session:nth-child(4) .num { background: color-mix(in srgb, var(--birdie-blue) 15%, #fff); }
  .session .date {
    font-family: var(--font-body);
    font-size: 13px; font-weight: 600;
    color: var(--birdie-teal);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .session h3 {
    font-family: var(--font-hero);
    font-weight: 600;
    font-size: 22px; line-height: 1.25;
    color: var(--birdie-navy);
    margin: 0 0 12px;
    letter-spacing: -0.008em;
    text-wrap: balance;
  }
  .session .theme {
    font-size: 14px; color: var(--fg-soft);
    line-height: 1.55;
    margin: 0;
  }

  /* ------------ How it works (navy band) ------------ */
  .how {
    background: var(--birdie-navy);
    color: #fff;
    padding: 104px 28px;
    position: relative;
    overflow: hidden;
  }
  .how::before {
    content: '';
    position: absolute;
    top: -160px; left: -120px;
    width: 420px; height: 420px;
    border-radius: 60% 40% 52% 48% / 48% 55% 45% 52%;
    background: rgba(84,189,184,0.18);
    filter: blur(2px);
  }
  .how::after {
    content: '';
    position: absolute;
    bottom: -180px; right: -100px;
    width: 360px; height: 360px;
    border-radius: 50% 50% 42% 58% / 55% 40% 60% 45%;
    background: rgba(240,150,0,0.15);
  }
  .how-inner {
    max-width: 1200px; margin: 0 auto;
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 72px;
    align-items: start;
  }
  .how-head .eyebrow {
    font-family: var(--font-body); font-weight: 600;
    font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--birdie-teal);
    margin-bottom: 14px;
  }
  .how-head h2 {
    font-family: var(--font-hero); font-weight: 700;
    font-size: 42px; line-height: 1.05;
    letter-spacing: -0.015em;
    color: #fff; margin: 0 0 20px;
    text-wrap: balance;
  }
  .how-head p {
    font-size: 16.5px; color: rgba(255,255,255,0.76);
    line-height: 1.6;
    margin: 0;
    max-width: 400px;
  }
  .how-list {
    display: flex; flex-direction: column;
    gap: 4px;
  }
  .how-item {
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 20px;
    padding: 22px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    align-items: start;
  }
  .how-item:last-child { border-bottom: 0; }
  .how-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: rgba(84,189,184,0.18);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .how-icon svg { width: 22px; height: 22px; color: var(--birdie-teal); stroke-width: 1.75; }
  .how-item h4 {
    font-family: var(--font-hero); font-weight: 600;
    font-size: 17px; color: #fff;
    margin: 4px 0 6px;
    letter-spacing: -0.005em;
  }
  .how-item p {
    font-size: 14.5px; line-height: 1.55;
    color: rgba(255,255,255,0.72);
    margin: 0;
  }
  .how-item .prize { color: var(--birdie-orange); font-weight: 600; }

  /* ------------ Who it's for ------------ */
  .who-for {
    background: var(--birdie-mint-25);
    padding: 88px 28px;
    position: relative;
    overflow: hidden;
  }
  .who-for::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 280px; height: 280px;
    border-radius: 58% 42% 50% 50% / 48% 55% 45% 52%;
    background: rgba(84,189,184,0.22);
  }
  .who-inner {
    max-width: 960px; margin: 0 auto;
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 40px;
    align-items: center;
  }
  .who-cal {
    width: 150px;
    justify-self: center;
  }
  .who-for h2 {
    font-family: var(--font-hero); font-weight: 700;
    font-size: 32px; line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--birdie-navy);
    margin: 0 0 14px;
  }
  .who-for p {
    font-size: 16px; line-height: 1.6;
    color: var(--birdie-navy-75);
    margin: 0 0 10px;
  }
  .who-for p strong { color: var(--birdie-navy); font-weight: 600; }
  .who-for p:last-child { margin: 0; }
  .who-for a { color: var(--birdie-navy); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }

  /* ------------ About Alexis ------------ */
  .about {
    padding: 104px 28px;
    background: #fff;
  }
  .about-inner {
    max-width: 1100px; margin: 0 auto;
    display: grid;
    grid-template-columns: 0.8fr 1.2fr;
    gap: 64px;
    align-items: center;
  }
  .about-photo-wrap {
    position: relative;
    aspect-ratio: 4/5;
    border-radius: 22px;
    overflow: hidden;
    background: linear-gradient(160deg, var(--birdie-teal-25), var(--birdie-mint-25));
  }
  .about-photo-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(84,189,184,0.35), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(240,150,0,0.18), transparent 55%);
  }
  .about-photo-wrap .placeholder {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    text-align: center;
    padding: 24px;
  }
  .placeholder-initials {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: var(--birdie-navy);
    color: #fff;
    display: grid; place-items: center;
    font-family: var(--font-hero);
    font-weight: 700;
    font-size: 52px;
    letter-spacing: -0.02em;
    box-shadow: var(--shadow-lg);
  }
  .placeholder-note {
    position: absolute; bottom: 18px; left: 18px; right: 18px;
    font-size: 11.5px;
    color: var(--birdie-navy-75);
    font-style: italic;
    opacity: 0.7;
  }
  .about-eyebrow {
    font-family: var(--font-body); font-weight: 600;
    font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--birdie-teal);
    margin-bottom: 12px;
  }
  .about h2 {
    font-family: var(--font-hero); font-weight: 700;
    font-size: 38px; line-height: 1.08;
    letter-spacing: -0.015em;
    color: var(--birdie-navy);
    margin: 0 0 20px;
  }
  .about p {
    font-size: 16.5px; line-height: 1.65;
    color: var(--fg-soft);
    margin: 0 0 16px;
  }
  .about-creds {
    display: flex; flex-wrap: wrap;
    gap: 10px; margin-top: 26px;
  }
  .cred {
    background: var(--birdie-off-white);
    color: var(--birdie-navy);
    font-size: 13px; font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--border-soft);
  }
  .cred svg { width: 14px; height: 14px; color: var(--birdie-teal); stroke-width: 2; }

  /* ------------ Registration CTA ------------ */
  .register {
    background: var(--birdie-navy);
    color: #fff;
    padding: 112px 28px;
    position: relative;
    overflow: hidden;
  }
  .register::before {
    content: '';
    position: absolute;
    top: -120px; right: -120px;
    width: 380px; height: 380px;
    border-radius: 55% 45% 48% 52% / 52% 58% 42% 48%;
    background: rgba(240,150,0,0.16);
  }
  .register::after {
    content: '';
    position: absolute;
    bottom: -180px; left: -100px;
    width: 360px; height: 360px;
    border-radius: 58% 42% 52% 48% / 48% 55% 45% 52%;
    background: rgba(84,189,184,0.18);
  }
  .register-inner {
    max-width: 1100px; margin: 0 auto;
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: 64px;
    align-items: start;
  }
  .register-copy {
    position: sticky;
    top: 90px;
    align-self: start;
  }
  .register-copy .hero-eyebrow { margin-bottom: 18px; }
  .register h2 {
    font-family: var(--font-hero); font-weight: 700;
    font-size: clamp(34px, 4vw, 48px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #fff;
    margin: 0 0 20px;
    text-wrap: balance;
  }
  .register h2 .accent { color: var(--birdie-orange); }
  .register p {
    font-size: 17px;
    color: rgba(255,255,255,0.78);
    line-height: 1.55;
    margin: 0 0 22px;
    max-width: 440px;
  }
  .register-list {
    list-style: none; padding: 0; margin: 0 0 24px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .register-list li {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; color: rgba(255,255,255,0.88);
  }
  .register-list li svg {
    width: 18px; height: 18px;
    color: var(--birdie-teal); stroke-width: 2.5;
    flex-shrink: 0;
  }
  .register-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    font-style: italic;
  }

  /* Form card */
  .register-card {
    background: #fff;
    border-radius: 22px;
    padding: 36px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 6px 14px rgba(0,0,0,0.12);
    color: var(--birdie-navy);
  }
  .register-card-head { margin-bottom: 22px; }
  .register-card-title {
    font-family: var(--font-hero); font-weight: 700;
    font-size: 22px; letter-spacing: -0.01em;
    color: var(--birdie-navy);
  }
  .register-card-sub {
    font-size: 14px; color: var(--fg-soft);
    margin-top: 4px;
  }
  .hs-form-target { min-height: 120px; }

  /* HubSpot form re-skin */
  .hs-form-target .hs-form,
  .hs-form-target form {
    font-family: var(--font-body) !important;
    color: var(--birdie-navy) !important;
  }
